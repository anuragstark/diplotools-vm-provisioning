events {
    worker_connections 1024;
}

http {
    upstream backends {
        server backend-a:8080;
        server backend-b:8080;
        server backend-c:8080;
    }

    # --------------------------------------------------------
    # OPTION 1: THE NGINX WAY (Certbot SSL Setup Placeholder)
    # --------------------------------------------------------
    server {
        listen 80;
        server_name anurag.com www.anurag.com localhost;

        # Certbot requires this location to verify the domain over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Once SSL is fully active, uncomment this to force HTTPS:
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # Keep this active for testing over raw HTTP IP
        location / {
            proxy_pass http://backends;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Uncomment this block once Certbot has generated the certificates!
    # server {
    #     listen 443 ssl;
    #     server_name anurag.com www.anurag.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/anurag.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/anurag.com/privkey.pem;
    #
    #     location / {
    #         proxy_pass http://backends;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     }
    # }
}
