name: Deploy Application (Node.js/Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - 'app/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Environment Target
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "EC2_TAG=ironman-app-server-staging" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "EC2_TAG=ironman-app-server-dev" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, Tag, and Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ironman-app-${{ env.ENV_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./app
        run: |
          # Build a docker container and push it to ECR
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Get EC2 Instance Details
        id: get-ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${EC2_TAG}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
            
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
            
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV

      - name: Sync Orchestration Files via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Base64 encode the files to avoid JSON string escaping issues
          COMPOSE_B64=$(base64 -w 0 docker-compose.yml)
          NGINX_B64=$(base64 -w 0 nginx.conf)
          BOOTSTRAP_B64=$(base64 -w 0 scripts/bootstrap-app.sh)
          PROM_B64=$(base64 -w 0 prometheus.yml)
          
          # Send the command to decode and run using a clean JSON payload file
          cat <<EOF > ssm_payload.json
          {
            "commands": [
              "mkdir -p /opt/myplatform",
              "echo $COMPOSE_B64 | base64 -d > /opt/myplatform/docker-compose.yml",
              "echo $NGINX_B64 | base64 -d > /opt/myplatform/nginx.conf",
              "echo $PROM_B64 | base64 -d > /opt/myplatform/prometheus.yml",
              "echo $BOOTSTRAP_B64 | base64 -d > /usr/local/bin/bootstrap-app.sh",
              "chmod +x /usr/local/bin/bootstrap-app.sh",
              "echo ECR_REGISTRY=${ECR_REGISTRY} > /opt/myplatform/.env",
              "echo IMAGE_TAG=${IMAGE_TAG} >> /opt/myplatform/.env",
              "echo ENV_NAME=${{ env.ENV_NAME }} >> /opt/myplatform/.env",
              "echo PUBLIC_IP=${{ env.PUBLIC_IP }} >> /opt/myplatform/.env",
              "/usr/local/bin/bootstrap-app.sh"
            ]
          }
          EOF
          
          aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters file://ssm_payload.json \
            --timeout-seconds 120
