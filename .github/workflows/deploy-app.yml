name: Deploy Application (Node.js/Docker)

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'vm-provisioning/app/**'
      - 'vm-provisioning/docker-compose.yml'

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Environment Target
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "EC2_TAG=ironman-app-server-staging" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "EC2_TAG=ironman-app-server-dev" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsRole
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, Tag, and Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ironman-app
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./vm-provisioning/app
        run: |
          # Build a docker container and push it to ECR
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # Also tag as the environment 'latest' for the compose file to easily pull
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:${ENV_NAME}-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${ENV_NAME}-latest

      - name: Get EC2 Instance ID by Tag
        id: get-ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${EC2_TAG}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Deploy via AWS Systems Manager (SSM)
        run: |
          # Send the command to the EC2 instance securely without SSH
          aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["/usr/local/bin/bootstrap-app.sh"]}' \
            --timeout-seconds 120
